<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="J.A.R.V.I.S." />
<meta name="mobile-web-app-capable" content="yes" />
<meta name="theme-color" content="#020c18" />
<title>J.A.R.V.I.S.</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;700&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@2.44.0/tabler-icons.min.css" />
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --arc: #00d4ff;
    --arc-dim: #00d4ff44;
    --arc-faint: #00d4ff11;
    --bg: #020c18;
    --bg2: #001a2a;
    --green: #00ff88;
    --text: #88eeff;
  }

  html, body {
    height: 100%;
    background: var(--bg);
    font-family: 'Orbitron', monospace;
    color: var(--arc);
    overflow: hidden;
  }

  .app {
    display: flex;
    flex-direction: column;
    height: 100dvh;
    max-width: 480px;
    margin: 0 auto;
    position: relative;
    overflow: hidden;
  }

  /* Scan line */
  .scan {
    position: absolute;
    left: 0; right: 0;
    height: 2px;
    background: linear-gradient(90deg, transparent, #00d4ff22, transparent);
    animation: scan 5s linear infinite;
    pointer-events: none;
    z-index: 10;
  }
  @keyframes scan { from { top: 0 } to { top: 100% } }

  /* Top bar */
  .topbar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 14px 18px 10px;
    border-bottom: 0.5px solid var(--arc-dim);
    flex-shrink: 0;
  }
  .logo {
    font-size: 16px;
    font-weight: 700;
    letter-spacing: 4px;
    color: var(--arc);
  }
  .topbar-right {
    display: flex;
    align-items: center;
    gap: 10px;
    font-size: 9px;
    letter-spacing: 1px;
    color: #00d4ff55;
  }
  .dot {
    width: 8px; height: 8px; border-radius: 50%;
    background: var(--green);
    animation: pulse 2s infinite;
  }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }

  /* Arc reactor */
  .arc-wrap {
    display: flex;
    justify-content: center;
    padding: 18px 0 8px;
    flex-shrink: 0;
  }
  .arc-ring {
    width: 110px; height: 110px;
    border-radius: 50%;
    border: 2px solid var(--arc-dim);
    display: flex; align-items: center; justify-content: center;
    position: relative;
    animation: spin 10s linear infinite;
  }
  .arc-ring::before {
    content: '';
    position: absolute; inset: -5px;
    border-radius: 50%;
    border: 2px solid transparent;
    border-top-color: var(--arc);
    border-right-color: var(--arc-dim);
    animation: spin 3s linear infinite;
  }
  .arc-core {
    width: 72px; height: 72px;
    border-radius: 50%;
    background: radial-gradient(circle, #003a52 0%, var(--bg) 70%);
    border: 1.5px solid var(--arc-dim);
    display: flex; align-items: center; justify-content: center;
    animation: spin-rev 10s linear infinite;
  }
  @keyframes spin { from{transform:rotate(0deg)} to{transform:rotate(360deg)} }
  @keyframes spin-rev { from{transform:rotate(0deg)} to{transform:rotate(-360deg)} }
  .arc-icon { font-size: 28px; color: var(--arc); animation: spin 10s linear infinite; }

  /* Greeting */
  .greeting {
    text-align: center;
    font-size: 10px;
    letter-spacing: 3px;
    color: #00d4ff66;
    margin-bottom: 2px;
    flex-shrink: 0;
  }
  .director {
    text-align: center;
    font-size: 14px;
    font-weight: 700;
    letter-spacing: 2px;
    margin-bottom: 8px;
    flex-shrink: 0;
  }

  /* Stats */
  .stats {
    display: flex;
    gap: 8px;
    padding: 0 14px 10px;
    flex-shrink: 0;
  }
  .stat {
    flex: 1;
    background: var(--arc-faint);
    border: 0.5px solid var(--arc-dim);
    border-radius: 8px;
    padding: 8px 4px;
    text-align: center;
  }
  .stat-v { font-size: 13px; font-weight: 700; }
  .stat-l { font-size: 8px; letter-spacing: 1px; color: #00d4ff55; margin-top: 3px; }

  /* Chat */
  .chat {
    flex: 1;
    overflow-y: auto;
    padding: 8px 14px;
    display: flex;
    flex-direction: column;
    gap: 10px;
    -webkit-overflow-scrolling: touch;
  }
  .chat::-webkit-scrollbar { width: 3px; }
  .chat::-webkit-scrollbar-track { background: transparent; }
  .chat::-webkit-scrollbar-thumb { background: var(--arc-dim); border-radius: 2px; }

  .msg { display: flex; flex-direction: column; }
  .msg.user { align-items: flex-end; }
  .msg.jarvis { align-items: flex-start; }

  .bubble {
    max-width: 88%;
    padding: 10px 14px;
    border-radius: 14px;
    font-size: 11px;
    line-height: 1.65;
    letter-spacing: 0.4px;
  }
  .msg.user .bubble {
    background: var(--arc-faint);
    border: 0.5px solid #00d4ff55;
    color: var(--arc);
    border-bottom-right-radius: 3px;
  }
  .msg.jarvis .bubble {
    background: var(--bg2);
    border: 0.5px solid var(--arc-dim);
    color: var(--text);
    border-bottom-left-radius: 3px;
  }
  .meta {
    font-size: 8px;
    color: #00d4ff33;
    letter-spacing: 1px;
    margin-top: 3px;
  }

  /* Typing indicator */
  .typing-wrap { display: flex; flex-direction: column; align-items: flex-start; }
  .typing {
    display: flex; gap: 5px; align-items: center;
    padding: 12px 16px;
    background: var(--bg2);
    border: 0.5px solid var(--arc-dim);
    border-radius: 14px; border-bottom-left-radius: 3px;
  }
  .td {
    width: 6px; height: 6px; border-radius: 50%;
    background: var(--arc);
    animation: blink 1.3s infinite;
  }
  .td:nth-child(2){animation-delay:.2s} .td:nth-child(3){animation-delay:.4s}
  @keyframes blink{0%,80%,100%{opacity:0.15}40%{opacity:1}}

  /* Quick buttons */
  .quick {
    display: flex;
    gap: 6px;
    padding: 8px 14px 6px;
    overflow-x: auto;
    flex-shrink: 0;
    -webkit-overflow-scrolling: touch;
  }
  .quick::-webkit-scrollbar { display: none; }
  .qbtn {
    white-space: nowrap;
    background: transparent;
    border: 0.5px solid var(--arc-dim);
    border-radius: 14px;
    color: #00d4ff77;
    font-family: 'Orbitron', monospace;
    font-size: 8px;
    letter-spacing: 0.5px;
    padding: 6px 12px;
    cursor: pointer;
    transition: all 0.2s;
    -webkit-tap-highlight-color: transparent;
  }
  .qbtn:active { background: var(--arc-faint); border-color: var(--arc); color: var(--arc); transform: scale(0.96); }

  /* Input */
  .input-row {
    display: flex;
    gap: 8px;
    padding: 10px 14px;
    border-top: 0.5px solid var(--arc-dim);
    flex-shrink: 0;
    padding-bottom: max(10px, env(safe-area-inset-bottom));
  }
  .jarvis-input {
    flex: 1;
    background: var(--arc-faint);
    border: 0.5px solid #00d4ff44;
    border-radius: 22px;
    padding: 11px 16px;
    color: var(--arc);
    font-family: 'Orbitron', monospace;
    font-size: 11px;
    letter-spacing: 0.4px;
    outline: none;
    -webkit-appearance: none;
  }
  .jarvis-input::placeholder { color: #00d4ff33; }
  .jarvis-input:focus { border-color: #00d4ff77; }

  .send-btn {
    width: 42px; height: 42px;
    border-radius: 50%;
    border: 1.5px solid #00d4ff66;
    background: var(--arc-faint);
    color: var(--arc);
    font-size: 18px;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
    -webkit-tap-highlight-color: transparent;
    transition: all 0.15s;
  }
  .send-btn:active { background: var(--arc-dim); transform: scale(0.93); }

  /* Corner decorations */
  .corner {
    position: absolute;
    width: 16px; height: 16px;
    pointer-events: none;
  }
  .corner.tl { top: 6px; left: 6px; border-top: 1px solid var(--arc-dim); border-left: 1px solid var(--arc-dim); }
  .corner.tr { top: 6px; right: 6px; border-top: 1px solid var(--arc-dim); border-right: 1px solid var(--arc-dim); }
  .corner.bl { bottom: 6px; left: 6px; border-bottom: 1px solid var(--arc-dim); border-left: 1px solid var(--arc-dim); }
  .corner.br { bottom: 6px; right: 6px; border-bottom: 1px solid var(--arc-dim); border-right: 1px solid var(--arc-dim); }
</style>
</head>
<body>
<div class="app">
  <div class="corner tl"></div>
  <div class="corner tr"></div>
  <div class="corner bl"></div>
  <div class="corner br"></div>
  <div class="scan"></div>

  <div class="topbar">
    <span class="logo">J.A.R.V.I.S.</span>
    <div class="topbar-right">
      <span>ONLINE</span>
      <div class="dot"></div>
    </div>
  </div>

  <div class="arc-wrap">
    <div class="arc-ring">
      <div class="arc-core">
        <i class="ti ti-atom arc-icon"></i>
      </div>
    </div>
  </div>

  <div class="greeting">GOOD DAY,</div>
  <div class="director">DIRECTOR</div>

  <div class="stats">
    <div class="stat"><div class="stat-v" id="aiPow">98%</div><div class="stat-l">AI CORE</div></div>
    <div class="stat"><div class="stat-v" id="latency">12ms</div><div class="stat-l">LATENCY</div></div>
    <div class="stat"><div class="stat-v" id="taskCount">0</div><div class="stat-l">TASKS</div></div>
    <div class="stat"><div class="stat-v" id="timeDisp">--:--</div><div class="stat-l">LOCAL TIME</div></div>
  </div>

  <div class="chat" id="chat">
    <div class="msg jarvis">
      <div class="bubble">SYSTEM ONLINE. All neural networks operational. How may I assist you today, Director?</div>
      <span class="meta">J.A.R.V.I.S. · READY</span>
    </div>
  </div>

  <div class="quick" id="quick">
    <button class="qbtn" onclick="send('What time is it and what should I do today?')">⏰ BRIEFING</button>
    <button class="qbtn" onclick="send('Run a full system diagnostic report')">🔬 DIAGNOSTICS</button>
    <button class="qbtn" onclick="send('Tell me an interesting science fact')">💡 INTEL</button>
    <button class="qbtn" onclick="send('What are you capable of doing?')">📋 CAPABILITIES</button>
    <button class="qbtn" onclick="send('Tell me a joke, JARVIS')">😄 HUMOR</button>
  </div>

  <div class="input-row">
    <input class="jarvis-input" id="inp" type="text" placeholder="ENTER COMMAND, DIRECTOR..." autocomplete="off" />
    <button class="send-btn" id="sendBtn" onclick="handleSend()">
      <i class="ti ti-send"></i>
    </button>
  </div>
</div>

<script>
const chat = document.getElementById('chat');
const inp = document.getElementById('inp');
let tasks = 0;

function tick() {
  const d = new Date();
  const h = d.getHours().toString().padStart(2,'0');
  const m = d.getMinutes().toString().padStart(2,'0');
  document.getElementById('timeDisp').textContent = h + ':' + m;
}
tick();
setInterval(tick, 10000);

setInterval(() => {
  document.getElementById('aiPow').textContent = (Math.floor(Math.random()*4)+96)+'%';
  document.getElementById('latency').textContent = (Math.floor(Math.random()*18)+8)+'ms';
}, 4000);

function ts() {
  const d = new Date();
  return d.getHours().toString().padStart(2,'0') + ':' + d.getMinutes().toString().padStart(2,'0');
}

function addMsg(role, text) {
  const wrap = document.createElement('div');
  wrap.className = 'msg ' + role;
  const b = document.createElement('div');
  b.className = 'bubble';
  b.textContent = text;
  const m = document.createElement('span');
  m.className = 'meta';
  m.textContent = (role === 'user' ? 'YOU' : 'J.A.R.V.I.S.') + ' · ' + ts();
  wrap.appendChild(b);
  wrap.appendChild(m);
  chat.appendChild(wrap);
  chat.scrollTop = chat.scrollHeight;
}

function showTyping() {
  const wrap = document.createElement('div');
  wrap.className = 'typing-wrap';
  wrap.id = 'typ';
  wrap.innerHTML = '<div class="typing"><div class="td"></div><div class="td"></div><div class="td"></div></div>';
  chat.appendChild(wrap);
  chat.scrollTop = chat.scrollHeight;
}

function removeTyping() {
  const el = document.getElementById('typ');
  if (el) el.remove();
}

async function callAI(prompt) {
  try {
    const r = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-6',
        max_tokens: 1000,
        system: 'You are J.A.R.V.I.S. — Just A Rather Very Intelligent System — Tony Stark\'s AI from Iron Man. Stay fully in character: precise, slightly formal, occasionally witty and dry. Always call the user "Director". Keep responses concise (2–4 sentences max unless a detailed answer is genuinely needed). Never break character or mention being an AI language model.',
        messages: [{ role: 'user', content: prompt }]
      })
    });
    const d = await r.json();
    return d.content?.[0]?.text || 'SYSTEM ERROR: Response unavailable, Director.';
  } catch(e) {
    return 'CONNECTION LOST: Unable to reach AI core. Please check your network, Director.';
  }
}

async function handleSend() {
  const txt = inp.value.trim();
  if (!txt) return;
  send(txt);
}

async function send(txt) {
  inp.value = '';
  addMsg('user', txt);
  tasks++;
  document.getElementById('taskCount').textContent = tasks;
  showTyping();
  const reply = await callAI(txt);
  removeTyping();
  addMsg('jarvis', reply);
}

inp.addEventListener('keydown', e => { if (e.key === 'Enter') handleSend(); });
</script>
</body>
</html>
